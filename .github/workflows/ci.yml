name: Qualidade do website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Lint, build e testes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar o código
        run: npm run lint

      - name: Construir e testar o website
        run: npm test